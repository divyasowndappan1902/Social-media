<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create an Account - Stackly</title>
    <link rel="icon" href="./Assets/icon.webp" />
    <link rel="stylesheet" href="./split-login.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  </head>
  <body>

    <!-- Left Split (Visual) -->
    <div class="split-left">
      <div class="left-content" data-aos="fade-right" data-aos-duration="1000">
        <h1>Join the Magic!</h1>
        <p>Create an account to start your journey into a world of endless fun and premium content.</p>
      </div>
    </div>

    <!-- Right Split (Form) -->
    <div class="split-right">

      <div class="auth-card" data-aos="fade-left" data-aos-duration="1000" data-aos-delay="200">
        <div class="auth-logo">
          <a href="./index.html">
            <img src="./Assets/logo.webp" alt="Stackly Logo" />
          </a>
        </div>
        <a href="./index.html" class="back-home-centered">
          <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
        
        <h2>Create an account</h2>

        <form id="signupForm">
          <!-- Role Toggle -->
          <div class="role-toggle-container">
            <div class="role-toggle">
              <input type="radio" id="role-customer" name="role" value="customer" checked>
              <label for="role-customer" class="role-label">Customer</label>
              
              <input type="radio" id="role-admin" name="role" value="admin">
              <label for="role-admin" class="role-label">Admin</label>
              
              <div class="role-selector"></div>
            </div>
          </div>

          <!-- Inputs -->
          <div class="input-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="John Doe" required />
          </div>

          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" required />
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
          </div>

          <div class="input-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="••••••••" required />
          </div>

          <button type="submit" class="btn-submit">CREATE ACCOUNT</button>

          <!-- Social Login -->
          <div class="social-login">
            <p>Or sign up with</p>
            <div class="social-icons">
              <a href="./error.html" class="social-icon"><i class="fa-brands fa-google"></i></a>
              <a href="./error.html" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="./error.html" class="social-icon"><i class="fa-brands fa-twitter"></i></a>
              <a href="./error.html" class="social-icon"><i class="fa-brands fa-apple"></i></a>
            </div>
          </div>

          <!-- Footer -->
          <div class="auth-footer">
            Already have an account? <a href="./login.html">Log In</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      const form = document.getElementById("signupForm");
      form.addEventListener("submit", (e) => {
        e.preventDefault();

        // Basic validation matching the old logic
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value.trim();
        const confirmPass = document.getElementById("confirm_password").value.trim();
        
        const gmailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
        const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6}$/;

        if (!gmailPattern.test(email)) {
          alert("Email must end with @gmail.com (Demo requirement)");
          return;
        }

      

        if (pass !== confirmPass) {
          alert("Passwords do not match!");
          return;
        }

        window.location.href = './login.html';
      });
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ once: true });
    </script>
  </body>
</html>
